          <button
            type="button"
            class="site-header__menu-toggle"
            aria-expanded="false"

            <div class="quiz-screen__body">
              <div class="quiz-screen__intro">
              <p class="quiz-progress">2/5</p>
              <p class="type-frequenz-quiz-prompt">
                <span class="title-line">What type of&nbsp;disinformation</span>

                <p class="quiz-quote type-sink-quiz-quote">Person A: “We need to talk about misinformation online.”<br />Person B: “But what about how traditional media also makes mistakes?”</p>

                <button type="button" class="quiz-answer-btn" data-label="Red Herring" data-correct="true">Red Herring</button>

              </div>
              <div class="quiz-answers__col">
                <button type="button" class="quiz-answer-btn" data-label="Cherry Picking" data-correct="false">Cherry Picking</button>

            </div>

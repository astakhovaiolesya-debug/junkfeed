<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Junk Feed — Quiz Results</title>
    <link rel="stylesheet" href="css/fonts.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
  </head>
  <body class="page-quiz">
    <div class="page page--padded">
      <div class="page__inner">
        <header class="site-header">
          <a href="index.html" class="site-header__logo" aria-label="Junk Feed home">
            <img src="images/logo_nav.svg" alt="Junk Feed" width="62" height="48" />
          </a>
          <button
            type="button"
            class="site-header__menu-toggle"
            aria-expanded="false"
            aria-controls="site-header-nav"
            aria-label="Open menu"
          >
            <span class="site-header__menu-bar" aria-hidden="true"></span>
            <span class="site-header__menu-bar" aria-hidden="true"></span>
            <span class="site-header__menu-bar" aria-hidden="true"></span>
          </button>
          <button
            type="button"
            class="site-header__backdrop"
            aria-label="Close menu"
            tabindex="-1"
            hidden
          ></button>
          <nav id="site-header-nav" class="site-header__nav" aria-label="Main navigation">
            <a href="index.html#techniques" class="site-header__link">Learn</a>
            <a href="quiz.html" class="btn btn--nav">Test your Feed</a>
          </nav>
        </header>
      </div>

      <div class="page__inner">
        <section class="quiz-screen" aria-label="Quiz results">
          <div class="hero-block__bg" aria-hidden="true"></div>
          <img class="hero-block__grid" src="images/hero-grid.png" alt="" aria-hidden="true" />
          <div class="quiz-screen__inner">
            <div class="results-copy">
              <h1 class="results-title type-sink-title">
                You know how manipulation works Keep checking what you consume
              </h1>
              <p id="results-score" class="type-frequenz-results">You answered 0 out of 5 correctly.</p>
            </div>
            <a href="index.html" class="btn btn--cta">Back to Home</a>
          </div>
        </section>
      </div>
    </div>
    <script src="js/nav.js" defer></script>
    <script src="js/motion.js" defer></script>
    <script src="js/quiz-data.js"></script>
    <script src="js/quiz-storage.js"></script>
    <script src="js/results.js"></script>
  </body>
</html>
